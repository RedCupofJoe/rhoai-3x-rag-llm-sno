# GPT-OSS 120B is optional: it only schedules on nodes with H100 or higher (nvidia.com/gpu.product).
# On clusters without such GPUs, the predictor stays Pending; other models (Granite, Gemma 2) are unaffected.
vllmInferenceService:
  annotations:
    openshift.io/display-name: gpt-oss-inference
    serving.kserve.io/deploymentMode: RawDeployment
    argocd.argoproj.io/sync-wave: "20"

  predictor:
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: nvidia.com/gpu.present
                  operator: In
                  values: ["true"]
                # H100 or higher (GFD sets nvidia.com/gpu.product from nvidia-smi)
                - key: nvidia.com/gpu.product
                  operator: In
                  values:
                    - NVIDIA-H100-80GB-HBM3
                    - NVIDIA-H100-80GB
                    - NVIDIA-H100-40GB-HBM3
                    - NVIDIA-H100-SXM5-80GB
                    - NVIDIA-H100-SXM4-80GB
                    - NVIDIA-H200-90GB-HBM3
                    - NVIDIA-H200-141GB-HBM3
                    - NVIDIA-H200

vllmServingRuntime:
  annotations:
    opendatahub.io/accelerator-name: nvidia-gpu
    opendatahub.io/apiProtocol: REST
    opendatahub.io/recommended-accelerators: '["nvidia.com/gpu"]'
    openshift.io/display-name: gpt-oss-inference
    argocd.argoproj.io/sync-wave: "20"

  model: openai/gpt-oss-120b

acceleratorProfile:
  enabled: false
